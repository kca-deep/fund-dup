services:
  # Ollama (LLM & Embedding)
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # 최초 실행 후 모델 다운로드 필요:
    # docker exec -it ollama ollama pull qwen3-vl
    # docker exec -it ollama ollama pull bge-m3

  # Qdrant (Hybrid Vector Database)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped

  # PostgreSQL (Metadata Database)
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: funddup
      POSTGRES_PASSWORD: funddup_secret_2024
      POSTGRES_DB: fund_dup
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U funddup -d fund_dup"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (Job Queue for BullMQ)
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ollama_data:
    driver: local
  qdrant_data:
    driver: local
  pg_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: funddup-network
